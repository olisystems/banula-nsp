apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banula-navigation-service-apps
  namespace: argocd
  labels:
    repo: banula-nsp
spec:
  project: banula
  source:
    repoURL: https://github.com/olisystems/banula-nsp.git
    targetRevision: main
    path: infra/argo
    directory:
      include: "{dev.yaml,int.yaml,prod.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
