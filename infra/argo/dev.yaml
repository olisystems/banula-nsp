apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banula-navigation-service-dev
  namespace: argocd
  labels:
    repo: banula-nsp
spec:
  project: banula
  source:
    repoURL: https://github.com/olisystems/banula-nsp.git
    targetRevision: develop
    path: infra/helm
    helm:
      valueFiles:
        - values.yaml
        - values.dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: oli-banula
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
