oli-app:
  replicaCount: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  restartPolicy: Always
  terminationGracePeriodSeconds: 45

  image:
    repository: "swr.eu-de.otc.t-systems.com/oli_banula/banulanavigationservice"
    pullPolicy: IfNotPresent
    tag: ""

  imagePullSecrets:
    - name: default-secret

  service:
    name: banula-navigation-service-service
    type: ClusterIP
    port: 80
    containerPort: 8080

  ingress:
    enabled: true
    className: "nginx"
    features:
      certManager:
        enabled: false
      sslRedirect:
        enabled: true
      rateLimiting:
        enabled: true
        rpm: 300
        connections: 10
      proxySettings:
        enabled: true
        bodySize: "8m"
        bufferSize: "32k"
      router:
        enabled: true
        prefix: "/nsp"
        stripPrefix: true
        routes:
          exposeCommon: false
          exposeAll: false

  env:
    SERVER_CONTEXT_PATH: "/nsp"
    NSP_LOG_PAYLOAD: "true"
    REMOTE_CHECK_ENABLED: "true"
    REMOTE_CHECK_INTERVAL: "3600000"
    REMOTE_CHECK_TIMEOUT: "10000"
    PLATFORM_URL: "http://platform-deban-service"
    PLATFORM_PARTY_ID: "BAN"
    PLATFORM_COUNTRY_CODE: "DE"

    ENVIRONMENT:
      configMapKeyRef:
        name: banula-nsp-config
        key: ENVIRONMENT
    SPRING_PROFILE:
      configMapKeyRef:
        name: banula-nsp-config
        key: SPRING_PROFILE
    NSP_URL:
      configMapKeyRef:
        name: banula-nsp-config
        key: NSP_URL

    MONGO_USER:
      secretKeyRef:
        name: mongodb-secret
        key: mongo_user
    MONGO_PASSWORD:
      secretKeyRef:
        name: mongodb-secret
        key: mongo_password
    MONGO_ENV:
      secretKeyRef:
        name: mongodb-secret
        key: mongo_env
    MONGO_ADDRESS:
      secretKeyRef:
        name: mongodb-secret
        key: mongo_address

  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m

  livenessProbe: {}
  readinessProbe: {}

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 90

  podDisruptionBudget:
    enabled: true
    minAvailable: 1
